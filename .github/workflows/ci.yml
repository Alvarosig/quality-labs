name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Runs nightly at 6am UTC — full suite (E2E + performance)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Manual trigger — useful for stress tests before a release

jobs:
  # ─── Runs on every push and PR ────────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install browser system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Conduit API
        run: |
          docker pull ghcr.io/alvarosig/conduit-api:latest
          docker run -d --name conduit-api \
            -p 8080:8080 \
            -e GIN_MODE=release \
            -e DB_PATH=/tmp/conduit.db \
            ghcr.io/alvarosig/conduit-api:latest
          for i in {1..30}; do
            curl -sf http://localhost:8080/api/ping && break || sleep 1
          done

      - name: Run API tests
        run: npm run test:api
        env:
          API_URL: http://localhost:8080

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: api-report
          path: playwright-report/
          retention-days: 7

  # ─── Runs nightly and on manual trigger only ──────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install browser system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 7

  # ─── Runs nightly and on manual trigger only ──────────────────────────────
  performance-tests:
    name: Performance Tests (Smoke)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Conduit API
        run: |
          docker pull ghcr.io/alvarosig/conduit-api:latest
          docker run -d --name conduit-api \
            -p 8080:8080 \
            -e GIN_MODE=release \
            -e DB_PATH=/tmp/conduit.db \
            ghcr.io/alvarosig/conduit-api:latest
          for i in {1..30}; do
            curl -sf http://localhost:8080/api/ping && break || sleep 1
          done

      - name: Run smoke test
        run: k6 run tests/performance/smoke.ts
        env:
          BASE_URL: http://localhost:8080/api

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: k6-results
          path: k6-results/
          retention-days: 7
